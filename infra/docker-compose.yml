version: '3.8'

services:
  # The API Ingestion Gateway
  api-gateway:
    build: 
      context: ../
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FASTAPI_ENV=development
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_DSN=postgresql://autoresolve:secret@postgres:5432/autoresolve
      - QDRANT_URL=http://qdrant:6333
      - AUTORESOLVE_API_KEY=dev-secret-key
      # Inject dummy keys to bypass strict Pydantic validation
      - OPENAI_API_KEY=dummy-local-key
      - ANTHROPIC_API_KEY=dummy-local-key
    depends_on:
      - kafka
      - postgres
      - qdrant

  # The AI LangGraph Worker
  ai-worker:
    build: 
      context: ../
      dockerfile: Dockerfile
    command: ["python", "-m", "src.agents.worker"] # Assuming entrypoint exists
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_DSN=postgresql://autoresolve:secret@postgres:5432/autoresolve
      - QDRANT_URL=http://qdrant:6333
      # Inject dummy keys to bypass strict Pydantic validation
      - OPENAI_API_KEY=dummy-local-key
      - ANTHROPIC_API_KEY=dummy-local-key
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      qdrant:
        condition: service_started

  # Infrastructure Dependencies
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: autoresolve
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: autoresolve

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"