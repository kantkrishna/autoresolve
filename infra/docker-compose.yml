services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - autoresolve_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autoresolve_net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoresolve
    ports:
      - "5432:5432"
    networks:
      - autoresolve_net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    networks:
      - autoresolve_net

  api-gateway:
    build: 
      context: ../
      dockerfile: Dockerfile
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ../:/app
      - /app/.venv
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092 
      - KAFKA_TOPIC=incidents
      - OPENAI_API_KEY=dummy_key_to_satisfy_pydantic
      - ANTHROPIC_API_KEY=dummy_key_to_satisfy_pydantic
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/autoresolve
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - autoresolve_net

  ai-worker:
    build:
      context: ../
      dockerfile: Dockerfile
    command: ["python", "-m", "src.agents.worker"]
    volumes:
      - ../:/app
      - /app/.venv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - OPENAI_API_KEY=dummy_key_to_satisfy_pydantic
      - ANTHROPIC_API_KEY=dummy_key_to_satisfy_pydantic
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/autoresolve
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/autoresolve
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - LLM_BACKEND=local
      # FIX: Prefixed with ollama/ to guide LiteLLM internal provider routing algorithms
      - LOCAL_MODEL_NAME=ollama/qwen2.5-coder:3b
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - autoresolve_net

networks:
  autoresolve_net:
    driver: bridge